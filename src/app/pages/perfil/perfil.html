<main class="profile-layout">
  <div class="profile-card">
    
    <div class="profile-header">
      <div class="avatar">
        <img src="{{ this.api.usuarioGithub().avatar_url}}" alt="Avatar">
      </div>
      <h1 class="user-name">{{ this.api.usuarioGithub().name }}</h1>
      <span class="badge">Se busca por malo</span>
    </div>

    <div class="data-panel">
      <div class="data-row">
        <span class="label">Nombre Clave</span>
        <span class="value">{{ this.api.usuarioGithub().login }}</span>
      </div>
      <div class="data-row">
        <span class="label">URL de perfil</span>
        <span class="value">{{ this.api.usuarioGithub().html_url }}</span>
      </div>
      <div class="data-row">
        <span class="label">Biografía</span>
        <span class="value">{{ this.api.usuarioGithub().bio }}</span>
      </div>
    </div>
  </div>
</main>
