<main class="auth-container">
  <div class="card">
    <h4 class="title">Registrate</h4>
    <form>
      <label class="field">
        <span class="input-icon">U</span>
        <input type="text" placeholder="Username" class="input-field" name="username" />
      </label>

      <label class="field">
        <span class="input-icon">@</span>
        <input type="email" placeholder="Email" class="input-field" name="email" />
      </label>

      <label class="field">
        <svg class="input-icon" viewBox="0 0 500 500">
          <path d="M80 192V144C80 64.47 144.5 0 224 0C303.5 0 368 64.47 368 144V192H384C419.3 192 448 220.7 448 256V448C448 483.3 419.3 512 384 512H64C28.65 512 0 483.3 0 448V256C0 220.7 28.65 192 64 192H80zM144 192H304V144C304 99.82 268.2 64 224 64C179.8 64 144 99.82 144 144V192z"></path>
        </svg>
        <input type="password" placeholder="Password" class="input-field" name="password" />
      </label>

      <button class="btn" type="button">Crear Cuenta</button>
      <a class="btn-link" routerLink="/login">¿Ya tienes cuenta? Log In</a>
    </form>
  </div>
</main>
